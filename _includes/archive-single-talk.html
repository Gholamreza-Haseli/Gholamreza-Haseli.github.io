<div class="{{ include.type | default: 'list' }}__item" style="border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px;">
  <article class="archive__item" itemscope itemtype="https://schemaorg/CreativeWork">
    
    <div style="display: flex; gap: 20px; align-items: flex-start;">
      
      {% if post.cover %}
        <div style="flex: 0 0 120px; margin-top: 5px;">
          <img src="{{ base_path }}{{ post.cover }}" alt="Cover: {{ post.title }}" style="width: 100%; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd;">
        </div>
      {% endif %}

      <div style="flex: 1;">
        
        <h2 class="archive__item-title" itemprop="headline" style="margin-top: 0 !important; margin-bottom: 4px !important; padding-bottom: 0 !important;">
          <a href="{{ base_path }}{{ post.url }}" rel="permalink" style="text-decoration: none;">{{ post.title }}</a>
        </h2>

        {% if post.excerpt %}
          <div class="archive__item-excerpt" itemprop="description" style="margin-top: 0 !important; margin-bottom: 0 !important;">
            <p style="margin: 0 !important; line-height: 1.4 !important; font-size: 0.95em;">
              {{ post.excerpt | markdownify | remove: '<p>' | remove: '</p>' }}
            </p>
          </div>
        {% endif %}

        {% if post.paperurl %}
          <p style="margin-top: 10px !important; margin-bottom: 0 !important;">
            <a href="{{ post.paperurl }}" class="btn btn--primary" style="padding: 4px 10px !important; font-size: 0.8em !important; border-radius: 4px !important;">
              <i class="fas fa-fw fa-download" aria-hidden="true"></i> Download / View Book
            </a>
          </p>
        {% endif %}

      </div> </div> </article>
</div>
